name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Next.js
        run: |
          rm -rf public/_next public/index.html public/404.html
          npm run build
        env:
          NEXT_PUBLIC_GCS_BUCKET_URL: https://storage.googleapis.com/citigrove-images

      - name: Copy build artifacts
        run: node scripts/copy-build.js

      - name: Deploy to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            npx firebase-tools deploy --only hosting:site \
              --project organic-spirit-488116-e2 \
              --non-interactive --force
          rm -f /tmp/sa.json
